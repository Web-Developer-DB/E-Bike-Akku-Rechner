<!doctype html>
<html lang="en">
  <head>
    <!--
      Vite serves this HTML file as the browser entry point.
      React mounts into #root and takes over the visible app UI.
    -->
    <meta charset="UTF-8" />

    <!-- Makes the layout responsive and prevents desktop-style scaling on phones. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Browser UI color used by PWA-capable mobile browsers. -->
    <meta name="theme-color" content="#00A884" />
    <meta
      name="description"
      content="A simple range calculator for e-bike batteries."
    />

    <!-- Web App Manifest makes the app installable as a PWA. React switches it for German locales. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <title>E-Bike Battery Calculator</title>
  </head>
  <body>
    <!-- React renders the complete app inside this root element. -->
    <div id="root"></div>

    <!-- Vite transforms this TypeScript entry point during dev and build. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
